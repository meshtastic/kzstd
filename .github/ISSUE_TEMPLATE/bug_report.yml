name: Bug report
description: Something isn't working as documented.
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much of the form as you can.
        For security issues, **do not file here** — see [`docs/security.md`](../../docs/security.md).

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: e.g. `0.1.0`, `0.2.0-SNAPSHOT`, or commit SHA
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: target
    attributes:
      label: Target platform
      multiple: true
      options:
        - Android
        - JVM (desktop / server)
        - iOS
        - wasmJs (browser)
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport in use
      multiple: true
      options:
        - BLE
        - TCP
        - USB Serial (Android)
        - Serial (JVM)
        - Other / N-A
    validations:
      required: true

  - type: input
    id: firmware
    attributes:
      label: Device firmware version
      description: From `AdminApi.getMetadata()` or the device's About screen
      placeholder: "2.5.10.abcdef"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Code snippet or `samples/cli` command. Smaller is better.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs at `LogLevel.Debug`. Redact PSKs and any session tokens.
        Wrap in triple backticks.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Affirmations
      options:
        - label: I have searched existing issues and this isn't a duplicate.
          required: true
        - label: I have read [`docs/security.md`](../../docs/security.md) and confirmed this is not a security-sensitive issue.
          required: true
